# Configuration for collocation-only RAR
# Adaptive refinement: adds spatial collocation points where PDE residual is high
experiment:
  name: "rar_collocation"
  desc: "Collocation-only Residual-based Adaptive Refinement"

training:
  epochs: 10000
  lr: 0.001
  device: auto
  num_domain: 2000
  num_boundary: 400
  num_loads: 100
  bc_weight: 10.0
  log_frequency: 500
  save_frequency: 2000

model:
  branch_layers: [100, 128, 128, 100]
  trunk_layers: [2, 128, 128, 50]
  activation: "tanh"

rar:
  enabled: true
  type: "collocation"
  frequency: 1000          # Refine every N epochs
  num_points_to_add: 50    # Collocation points added per refinement
