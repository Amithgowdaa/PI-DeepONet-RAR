# Baseline configuration for uniform collocation sampling
experiment:
  name: "baseline"
  desc: "Uniform sampling baseline"
training:
  epochs: 5
  lr: 0.001
  batch_size: 128
  num_domain: 2000
  num_boundary: 400
  num_loads: 100
model:
  branch_layers: [100, 128, 128, 50]
  trunk_layers: [2, 128, 128, 50]
  activation: "tanh"
rar:
  enabled: false
