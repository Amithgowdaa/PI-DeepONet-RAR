# Baseline configuration — uniform collocation sampling (no RAR)
experiment:
  name: "baseline"
  desc: "Uniform sampling baseline — no adaptive refinement"

training:
  epochs: 10000
  lr: 0.001
  device: auto          # auto | cpu | cuda
  num_domain: 2000
  num_boundary: 400
  num_loads: 100
  bc_weight: 10.0       # Weight for boundary condition loss
  log_frequency: 500    # Print losses every N epochs
  save_frequency: 2000  # Save checkpoint every N epochs

model:
  branch_layers: [100, 128, 128, 100]   # Input: 100 sensors, Output: 50*2=100
  trunk_layers: [2, 128, 128, 50]       # Input: (x,y), Output: P=50
  activation: "tanh"

rar:
  enabled: false
